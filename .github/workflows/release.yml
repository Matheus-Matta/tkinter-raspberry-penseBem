name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar QEMU (emulação ARMv6)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Compilar para Raspberry Pi 1 (ARMv6 32-bit)
        run: |
          docker run --rm --platform linux/arm/v6 \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            arm32v6/debian:bullseye \
            bash -c "
              set -e
              apt-get update -q
              apt-get install -y -q python3 python3-pip python3-tk tk tcl upx-ucl binutils
              pip3 install --no-cache-dir customtkinter==5.2.2 darkdetect typing_extensions pyinstaller
              python3 -m PyInstaller \
                --onefile \
                --noconsole \
                --name penseBem_${{ github.ref_name }} \
                --collect-all customtkinter \
                main.py
            "

      - name: Criar Release no GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/penseBem_${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
